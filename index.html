<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#863bff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triventa Exports | Premium Indian Coffee Beans Exporter</title>
    <meta name="description" content="Triventa Exports is a premium exporter and supplier of green and roasted Arabica and Robusta coffee beans directly from the coffee-growing regions of Karnataka, India." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>

    <!-- Netlify form registration for React SPA forms -->
    <div hidden>
      <form name="request-sample" data-netlify="true">
        <input type="hidden" name="form-name" value="request-sample" />
        <input type="hidden" name="bot-field" />
        <input type="text" name="name" />
        <input type="text" name="roastery" />
        <input type="email" name="email" />
        <input type="text" name="country" />
        <input type="text" name="volume" />
        <input type="text" name="message" />
        <input type="text" name="selected-beans" />
        <input type="text" name="tracking-ref" />
      </form>

      <form name="fob-calculator" data-netlify="true">
        <input type="hidden" name="form-name" value="fob-calculator" />
        <input type="hidden" name="bot-field" />
        <input type="text" name="name" />
        <input type="text" name="company" />
        <input type="email" name="email" />
        <input type="text" name="country" />
      </form>

      <form name="offer-list" data-netlify="true">
        <input type="hidden" name="form-name" value="offer-list" />
        <input type="hidden" name="bot-field" />
        <input type="email" name="email" />
      </form>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
